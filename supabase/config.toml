# All Edge Functions handle auth internally via getAuthenticatedUserId(),
# so we disable the Supabase gateway JWT check to avoid redundant verification
# that can fail independently (e.g. token format changes, clock skew).

[functions.plaid-create-link-token]
verify_jwt = false

[functions.plaid-exchange-token]
verify_jwt = false

[functions.plaid-sync-accounts]
verify_jwt = false

[functions.plaid-sync-transactions]
verify_jwt = false

[functions.plaid-backfill-counterparty]
verify_jwt = false
